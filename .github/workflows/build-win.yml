# 在 Windows 上构建 exe，避免在 Linux 上交叉编译导致在 Windows 运行报错
name: Build Windows exe

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build Windows exe
        run: npm run build:win

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: release/
